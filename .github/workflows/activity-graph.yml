name: Generate Activity Graph

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  push:
    branches:
      - main
  workflow_dispatch:        # lets you trigger it manually

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate activity graph
        run: node scripts/generate-activity-graph.js
        env:
          GH_USERNAME: sumanthgubbala
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity-graph.svg
          git diff --staged --quiet || git commit -m "Update animated activity graph"
          git push
