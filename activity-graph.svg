<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <style>
      .bg { fill: #1a1b27; }
      .title { fill: #c0caf5; font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 600; }
      .subtitle { fill: #565f89; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; }
      .axis { stroke: #292e42; stroke-width: 1; }

      .area { opacity: 0; animation: fadeArea 5s ease-in-out infinite alternate; }
      .line {
        stroke: #7aa2f7; stroke-width: 3; fill: none;
        stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 1500; stroke-dashoffset: 1500;
        animation: drawLine 5s ease-in-out infinite alternate;
      }
      .dot { fill: #7aa2f7; opacity: 0; animation: popDot 5s ease-in-out infinite alternate; }

      @keyframes drawLine { 0% { stroke-dashoffset: 1500; } 60% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
      @keyframes fadeArea { 0% { opacity: 0; } 60% { opacity: 1; } 100% { opacity: 1; } }
      @keyframes popDot { 0% { opacity: 0; r: 0; } 100% { opacity: 1; r: 4.5; } }
    </style>
  </defs>

  <rect class="bg" width="800" height="300" rx="10"/>
  <text x="30" y="35" class="title">sumanthgubbala's Contribution Activity</text>
  <text x="30" y="54" class="subtitle">Last 8 weeks · 75 contributions in the past year</text>
  <line class="axis" x1="60" y1="260" x2="760" y2="260"/>

  <path class="area" fill="url(#areaFill)" d="M60,260 C108.5,260 108.5,260 157,260 C205.5,260 205.5,260 254,260 C302.5,260 302.5,84 351,84 C399.5,84 399.5,260 448,260 C496.5,260 496.5,260 545,260 C593.5,260 593.5,260 642,260 C690.5,260 690.5,40 739,40 L739,260 L60,260 Z"/>
  <path class="line" d="M60,260 C108.5,260 108.5,260 157,260 C205.5,260 205.5,260 254,260 C302.5,260 302.5,84 351,84 C399.5,84 399.5,260 448,260 C496.5,260 496.5,260 545,260 C593.5,260 593.5,260 642,260 C690.5,260 690.5,40 739,40"/>

  <circle class="dot" cx="60" cy="260" style="animation-delay:0.1s"/>
  <circle class="dot" cx="157" cy="260" style="animation-delay:0.6s"/>
  <circle class="dot" cx="254" cy="260" style="animation-delay:1.1s"/>
  <circle class="dot" cx="351" cy="84" style="animation-delay:1.6s"/>
  <circle class="dot" cx="448" cy="260" style="animation-delay:2.1s"/>
  <circle class="dot" cx="545" cy="260" style="animation-delay:2.6s"/>
  <circle class="dot" cx="642" cy="260" style="animation-delay:3.1s"/>
  <circle class="dot" cx="739" cy="40" style="animation-delay:3.6s"/>
</svg>
